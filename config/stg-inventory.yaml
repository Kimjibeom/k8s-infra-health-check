# ============================================
# SSH 접속 설정 (보안)
# ============================================
ssh_config:
  # SSH 키 파일 경로 (상대 또는 절대 경로)
  private_key_path: "~/.ssh/id_rsa"
  
  # SSH 사용자
  default_user: "root"
  
  # SSH 연결 타임아웃 (초)
  connect_timeout: 10
  
  # 명령 실행 타임아웃 (초)
  command_timeout: 30


# ============================================
# 보고서 설정
# ============================================
report:
  company_name: "CMP 인프라"
  team_name: "클라우드서비스팀"
  output_dir: "./output"
